  <style>
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#170017;
      font-family:Arial,Helvetica,sans-serif;
      min-height:100%;
    }
    .wrap{
      width:100%;
      max-width:430px;
      margin:0 auto;
      background:#170017;
    }
    .hero{
      width:100%;
      display:block;
      height:auto;
    }
    .cta-area{
      padding:22px 18px calc(34px + env(safe-area-inset-bottom));
      background:#170017;
    }
    .cta{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      width:100%;
      min-height:86px;
      text-decoration:none;
      color:#fff7d9;
      text-align:center;
      text-transform:uppercase;
      font-weight:900;
      font-size:19px;
      line-height:1.05;
      letter-spacing:.5px;
      border-radius:999px;
      padding:18px 20px;
      background:linear-gradient(180deg,#53f48d 0%, #1ecb61 100%);
      border:3px solid rgba(255,220,120,.45);
      box-shadow:
        0 10px 24px rgba(0,0,0,.35),
        inset 0 2px 0 rgba(255,255,255,.35),
        inset 0 -4px 0 rgba(0,0,0,.16);
    }
    .cta .icon{
      flex:0 0 48px;
      width:48px;
      height:48px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:26px;
      background:rgba(255,255,255,.14);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.25);
    }
    .cta .label{
      flex:1;
    }
    .cta .sub{
      display:block;
      margin-top:4px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.2px;
      text-transform:none;
      color:rgba(255,255,255,.92);
    }
    @media (max-width:380px){
      .cta{font-size:17px; min-height:80px;}
      .cta .icon{width:42px;height:42px;font-size:22px;}
    }
