  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #120514;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
    }
    .page {
      width: 100%;
      max-width: 700px;
      min-height: 100vh;
      background: #120514;
    }
    .hero-wrap {
      position: relative;
      width: 100%;
    }
    .hero {
      display: block;
      width: 100%;
      height: auto;
    }
    .sticky-cta {
      position: fixed;
      left: 50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(calc(100% - 24px), 560px);
      z-index: 50;
      text-decoration: none;
      color: #fff;
      text-align: center;
      border-radius: 22px;
      background: linear-gradient(180deg, #29d868 0%, #11b457 100%);
      border: 2px solid rgba(255,255,255,0.22);
      box-shadow: 0 12px 30px rgba(0,0,0,0.34), 0 0 0 4px rgba(41,216,104,0.14);
      padding: 14px 16px 13px;
      animation: pulse 1.7s infinite;
      -webkit-tap-highlight-color: transparent;
    }
    .sticky-cta strong {
      display: block;
      font-size: clamp(19px, 5.2vw, 30px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .sticky-cta small {
      display: block;
      margin-top: 6px;
      font-size: clamp(12px, 3.5vw, 15px);
      line-height: 1.2;
      font-weight: 700;
      opacity: 0.97;
      text-transform: none;
    }
    .bottom-spacer {
      height: 108px;
    }
    @keyframes pulse {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.03); }
      100% { transform: translateX(-50%) scale(1); }
    }
    @media (min-width: 768px) {
      .sticky-cta {
        width: min(calc(100% - 40px), 470px);
        border-radius: 999px;
        padding: 16px 24px 14px;
      }
      .bottom-spacer { height: 118px; }
    }
  </style>

  </script>
</body>
