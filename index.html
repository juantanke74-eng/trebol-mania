<html lang="es">
<head>
  <meta charset="UTF-8" />

  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1666116987890980&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->

  <style>
    :root {
      --safe-bottom: max(env(safe-area-inset-bottom), 14px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #140013;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #140013;
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 768px;
      margin: 0 auto;
    }

    .hero {
      display: block;
      width: 100%;
      height: auto;
    }

    .cta-wrap {
      position: absolute;
      left: 50%;
      bottom: calc(var(--safe-bottom) + 20px);
      transform: translateX(-50%);
      width: min(92%, 650px);
      z-index: 5;
      text-decoration: none;
    }

    .cta {
      width: 100%;
      border: 3px solid rgba(255,255,255,0.25);
      border-radius: 28px;
      background: linear-gradient(180deg, #39de73 0%, #1fbf54 100%);
      color: white;
      text-align: center;
      padding: 18px 22px 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35), inset 0 2px 0 rgba(255,255,255,0.35);
      animation: pulse 1.9s infinite;
    }

    .cta-top {
      font-size: clamp(26px, 4.3vw, 38px);
      font-weight: 900;
      letter-spacing: 0.5px;
      line-height: 1.03;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .cta-bottom {
      margin-top: 8px;
      font-size: clamp(15px, 2.6vw, 22px);
      font-weight: 700;
      opacity: 0.98;
    }

    .bubble {
      width: clamp(42px, 7vw, 58px);
      height: clamp(42px, 7vw, 58px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: #1fbf54;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
      font-size: clamp(20px, 3.5vw, 28px);
      flex: 0 0 auto;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.018); }
      100% { transform: scale(1); }
    }

    @media (max-width: 560px) {
      .cta-wrap {
        bottom: calc(var(--safe-bottom) + 10px);
        width: 94%;
      }

      .cta {
        border-radius: 24px;
        padding: 16px 16px 14px;
      }

      .cta-top {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <img src="principal.jpg" alt="Trebol Mania" class="hero" />
      <a
        class="cta-wrap"
        href="https://www.linkify.com.ar/api/soporte?id=qdfa92"
        target="_blank"
        rel="noopener noreferrer"
        onclick="fbq('track', 'Lead');"
      >
        <div class="cta">
          <div class="cta-top">
            <span class="bubble">💬</span>
            <span>Entrar por WhatsApp</span>
          </div>
          <div class="cta-bottom">Tocá acá y empezá ahora</div>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
