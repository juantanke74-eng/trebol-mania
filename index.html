  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #120013;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }
    .page {

      color: #fff;
      display: flex;

      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
    }
    .side {
      width: 58px;
      height: 58px;
      min-width: 58px;
      border-radius: 999px;
