  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #160518;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      overflow: hidden;
    }
    .app {
      position: relative;
      width: 100%;
      max-width: 480px;
      min-height: 100svh;
      min-height: 100vh;
      overflow: hidden;
      background: #160518;
    }
    .hero {
      position: absolute;
      inset: 0;
      background-image: url('principal.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center top;
      transform: scale(1.01);
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(15, 2, 16, 0.04) 0%,
        rgba(15, 2, 16, 0.04) 58%,
        rgba(15, 2, 16, 0.24) 74%,
        rgba(15, 2, 16, 0.50) 100%);
    }
    .cta-wrap {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 2;
    }
    .cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      text-decoration: none;
      color: #fff;
      padding: 18px 18px;
      border-radius: 32px;
      background: linear-gradient(180deg, #32e06d 0%, #18bd5a 100%);
      border: 3px solid rgba(255,255,255,0.30);
      box-shadow: 0 14px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.28);
      -webkit-tap-highlight-color: transparent;
      animation: pulse 1.8s infinite;
    }
    .cta-icon,
    .cta-arrow {
      flex: 0 0 52px;
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      font-size: 29px;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .cta-text {
      flex: 1 1 auto;
      min-width: 0;
      text-align: left;
    }
    .cta-title {
      display: block;
      font-size: clamp(22px, 8vw, 34px);
      line-height: 0.96;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.16);
    }
    .cta-sub {
      display: block;
      margin-top: 6px;
      font-size: clamp(12px, 3.8vw, 16px);
      font-weight: 700;
      opacity: 0.96;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.018); }
    }
    @media (max-width: 390px) {
      .cta { padding: 16px 16px; }
      .cta-icon, .cta-arrow { width: 48px; height: 48px; flex-basis: 48px; font-size: 26px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="hero"></div>
    <div class="cta-wrap">
      <a class="cta" id="whatsappButton" href="https://www.linkify.com.ar/api/soporte?id=qdfa92" target="_blank" rel="noopener noreferrer" aria-label="Hablar por WhatsApp">
        <span class="cta-icon">💬</span>
        <span class="cta-text">
          <span class="cta-title">Entrar por WhatsApp</span>
          <span class="cta-sub">Tocá acá y empezá ahora</span>
        </span>
        <span class="cta-arrow">➜</span>
      </a>
    </div>
  </main>

  <script>
    document.getElementById('whatsappButton').addEventListener('click', function() {
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Lead');
      }
    });
  </script>
</body>
</html>
