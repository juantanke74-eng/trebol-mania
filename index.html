<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#150016" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #160015;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }
    body {
      display: flex;
      justify-content: center;
    }
    .wrap {
      position: relative;
      width: 100%;
      max-width: 560px;
      min-height: 100dvh;
      background: #160015;
    }
    .hero {
      display: block;
      width: 100%;
      height: auto;
    }

    .floating-wa {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(88vw, 420px);
      text-decoration: none;
      z-index: 999;
      animation: pulse 1.9s infinite;
      filter: drop-shadow(0 8px 22px rgba(0,0,0,.45));
    }

    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      min-height: 82px;
      padding: 16px 22px;
      border-radius: 999px;
      background: linear-gradient(180deg, #35e56f 0%, #19c85d 100%);
      border: 3px solid rgba(255,255,255,.28);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.2),
        0 0 0 3px rgba(255, 214, 90, .28),
        0 14px 30px rgba(0,0,0,.33);
    }

    .wa-icon {
      width: 56px;
      height: 56px;
      flex: 0 0 56px;
      border-radius: 50%;
      background: rgba(255,255,255,.14);
      display: grid;
      place-items: center;
      font-size: 29px;
      color: #fff;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.22);
    }

    .wa-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.02;
      color: #fff;
      text-align: center;
    }
    .wa-title {
      font-weight: 900;
      font-size: clamp(22px, 5.5vw, 34px);
      letter-spacing: .4px;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(0,0,0,.18);
      font-style: italic;
    }
    .wa-sub {
      margin-top: 5px;
      font-size: clamp(12px, 3vw, 17px);
      font-weight: 700;
      opacity: .98;
    }

    .bottom-space {
      height: 126px;
    }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.035); }
    }

    @media (max-width: 420px) {
      .wa-btn {
        min-height: 76px;
        padding: 14px 18px;
        gap: 12px;
      }
      .wa-icon {
        width: 52px;
        height: 52px;
        flex-basis: 52px;
        font-size: 27px;
      }
      .bottom-space { height: 118px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="hero" src="principal.png" alt="Trebol Mania" />
    <div class="bottom-space"></div>
  </main>

  <a class="floating-wa" href="https://www.linkify.com.ar/api/soporte?id=qdfa92" target="_blank" rel="noopener noreferrer"
     onclick="fbq('track','Lead');">
    <div class="wa-btn">
      <div class="wa-icon">🟢</div>
      <div class="wa-text">
        <div class="wa-title">Hablar por WhatsApp</div>
        <div class="wa-sub">Tocá acá y empezá ahora</div>
      </div>
      <div class="wa-icon">🟢</div>
    </div>
  </a>
</body>
</html>
