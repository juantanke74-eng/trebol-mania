  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #120514;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      overflow-x: hidden;
    }
    .hero-screen {
      position: relative;
      min-height: 100svh;
      min-height: 100vh;
      width: 100%;
      background-image: url('principal.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center center;
    }
    .hero-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(18,5,20,0.04) 0%, rgba(18,5,20,0.08) 68%, rgba(18,5,20,0.28) 100%);
      pointer-events: none;
    }
    .cta-wrap {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 2;
    }
    .cta {
      display: block;
      width: 100%;
      text-decoration: none;
      color: #fff;
      text-align: center;
      border-radius: 24px;
      background: linear-gradient(180deg, #2add6b 0%, #14b95a 100%);
      border: 2px solid rgba(255,255,255,0.24);
      box-shadow: 0 14px 35px rgba(0,0,0,0.32), 0 0 0 4px rgba(41,216,104,0.14);
      padding: 16px 14px 14px;
      animation: pulse 1.8s infinite;
      -webkit-tap-highlight-color: transparent;
    }
    .cta strong {
      display: block;
      font-size: clamp(20px, 7vw, 34px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .cta small {
      display: block;
      margin-top: 7px;
      font-size: clamp(12px, 4vw, 16px);
      line-height: 1.2;
      font-weight: 700;
      opacity: 0.97;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }
    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
        align-items: stretch;
      }
      .hero-screen {
        width: 100%;
        max-width: 520px;
        min-height: 100vh;
      }
      .cta-wrap {
        left: 20px;
        right: 20px;
        bottom: 22px;
      }
      .cta {
        border-radius: 28px;
        padding: 18px 18px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="hero-screen">
    <div class="cta-wrap">

        <strong>💬 Entrar por WhatsApp</strong>
        <small>Tocá acá y empezá ahora</small>
      </a>
    </div>
  </main>

  <script>
    document.getElementById('whatsappButton').addEventListener('click', function() {
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Lead');
      }
    });
  </script>
</body>
</html>
